workflows:
  android-apk:
    name: "Memory Maker Android APK"
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - memorymaker_env

    scripts:
      - name: "Recreate Android project"
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.memorymaker --project-name memorymaker_user_app

      - name: "Patch Android permissions and app name"
        script: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
          ]
          for permission in reversed(permissions):
              if permission not in text:
                  text = text.replace(
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission
                  )
          text = text.replace('android:label="memorymaker_user_app"', 'android:label="Memory Maker"')
          manifest.write_text(text)
          PY

      - name: "Create environment file"
        script: |
          cat > .env <<EOF_ENV
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          APP_URL=${APP_URL}
          DEMO_MODE=${DEMO_MODE}
          EOF_ENV

      - name: "Get Flutter packages and icons"
        script: |
          flutter clean
          flutter pub get
          dart run flutter_launcher_icons || true

      - name: "Build release APK"
        script: |
          flutter build apk --release -t lib/main.dart \
            --dart-define=SUPABASE_URL=${SUPABASE_URL} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY} \
            --dart-define=APP_URL=${APP_URL} \
            --dart-define=DEMO_MODE=${DEMO_MODE}

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
