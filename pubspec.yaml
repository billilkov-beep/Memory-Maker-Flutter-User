name: memorymaker_user_app
version: 1.0.1+2
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  image: ^4.2.0
  permission_handler: ^11.3.1
  share_plus: ^10.1.2
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/app_icon.png
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#fff7f0"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
